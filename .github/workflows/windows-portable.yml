name: Build Portable Windows App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller GameLauncher.spec --noconfirm

      - name: Zip portable app
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/GameLauncher/*" -DestinationPath "GameLauncher-portable-windows.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameLauncher-portable-windows
          path: GameLauncher-portable-windows.zip

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: GameLauncher-portable-windows.zip
